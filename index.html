<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mundial Familiar - Picotas 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --gold: #F5C518; --green: #006644; --green-light: #00875A;
  --bg: #0a0f0a; --surface: #111811; --surface2: #1a221a;
  --border: #2a382a; --text: #e8f0e8; --text-muted: #7a9a7a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
header { background: var(--surface); border-bottom: 2px solid var(--gold); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; color: var(--gold); }
.logo span { color: var(--text); }
nav { display: flex; gap: 4px; padding: 1rem 1.5rem 0; border-bottom: 1px solid var(--border); background: var(--surface); overflow-x: auto; }
.nav-btn { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 1px; padding: 8px 20px; border: none; background: none; color: var(--text-muted); cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; }
.nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
main { max-width: 700px; margin: 0 auto; padding: 1.5rem; }
.section { display: none; } .section.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
.match-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
.match-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.match-group { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
.match-date { font-size: 11px; color: var(--text-muted); }
.match-teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; margin-bottom: 14px; }
.team-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 1px; }
.team-left { text-align: right; }
.score-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; text-align: center; min-width: 60px; }
.score { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--gold); }
.badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.badge-done { background: #1d3a1d; color: #68d391; }
.badge-soon { background: #1a2a3a; color: #63b3ed; }
.pred-section { border-top: 1px solid var(--border); padding-top: 12px; }
.pred-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.score-input-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; }
.score-input { width: 52px; height: 48px; text-align: center; font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--gold); outline: none; }
.score-input:focus { border-color: var(--gold); }
.score-input:disabled { opacity: 0.6; cursor: default; }
.score-sep { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--text-muted); }
.score-team-label { font-size: 11px; color: var(--text-muted); text-align: center; margin-bottom: 4px; }
.btn-save-pred { width: 100%; padding: 9px; background: var(--gold); color: #0a0f0a; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; margin-top: 4px; }
.btn-save-pred:disabled { opacity: 0.5; cursor: default; background: var(--surface2); color: var(--text-muted); }
.pts-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
.pts-exact { background: #1a3a2a; color: #68d391; border: 1px solid #00875A; }
.pts-outcome { background: #2a2a0a; color: var(--gold); border: 1px solid #5a5000; }
.pts-wrong { background: #2a0a0a; color: #fc8181; border: 1px solid #742a2a; }
.pts-pending { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
.family-preds { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
.family-chip { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 12px; }
.family-score { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--text-muted); }
.lb-item { display: flex; align-items: center; gap: 14px; padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; }
.lb-item.me { border-color: var(--gold); }
.lb-rank { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; width: 36px; text-align: center; color: var(--text-muted); }
.lb-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--green); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--gold); flex-shrink: 0; }
.lb-pts-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--gold); line-height: 1; }
.lb-pts-label { font-size: 11px; color: var(--text-muted); }
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1rem; }
.stat-card { background: var(--surface2); border-radius: 10px; padding: 12px; text-align: center; }
.stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--gold); line-height: 1; }
.stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 1px; color: var(--gold); margin-bottom: 1rem; }
.empty { text-align: center; color: var(--text-muted); padding: 3rem 1rem; font-size: 14px; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
.day-header { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; margin-bottom:8px; cursor:pointer; user-select:none; }
.day-header:hover { border-color:#F5C518; }
.day-title { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:1px; color:#e8f0e8; }
.day-meta { display:flex; align-items:center; gap:8px; }
.day-count { font-size:11px; color:#7a9a7a; }
.day-arrow { font-size:12px; color:#7a9a7a; transition:transform 0.2s; }
.day-arrow.open { transform:rotate(180deg); }
.day-group { margin-bottom:6px; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.btn-logout { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.legend { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; font-size: 12px; color: var(--text-muted); align-items: center; }
#app { display: none; }
#login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 380px; text-align: center; }
.login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--gold); letter-spacing: 3px; margin-bottom: 4px; }
.input { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; margin-bottom: 10px; outline: none; display: block; }
.input:focus { border-color: var(--gold); }
.btn-main { width: 100%; padding: 11px; background: var(--gold); color: #0a0f0a; border: none; border-radius: 8px; font-weight: 600; font-size: 15px; cursor: pointer; display: block; margin-bottom: 8px; }
.btn-sec { width: 100%; padding: 11px; background: none; border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-weight: 500; font-size: 14px; cursor: pointer; display: block; }
.login-err { color: #fc8181; font-size: 13px; margin-top: 8px; min-height: 20px; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; max-width: 320px; text-align: center; }
.toast.show { opacity: 1; }
.toast-error { background: #2a0808; border: 1px solid #742a2a; color: #fc8181; }
.toast-ok { background: #0d2a1a; border: 1px solid #00875A; color: #68d391; }
.toast-info { background: #1a1a05; border: 1px solid #5a5000; color: #F5C518; }
.confirm-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 9998; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.confirm-box { background: #111811; border: 1px solid #2a382a; border-radius: 14px; padding: 1.5rem; max-width: 320px; width: 100%; text-align: center; }
.confirm-title { font-size: 15px; font-weight: 600; color: #e8f0e8; margin-bottom: 8px; }
.confirm-msg { font-size: 13px; color: #7a9a7a; margin-bottom: 1.25rem; line-height: 1.5; }
.confirm-btns { display: flex; gap: 8px; }
.confirm-btn-cancel { flex: 1; padding: 9px; border: 1px solid #2a382a; border-radius: 8px; background: none; color: #7a9a7a; font-size: 14px; cursor: pointer; }
.confirm-btn-ok { flex: 1; padding: 9px; border: none; border-radius: 8px; background: #742a2a; color: #fc8181; font-size: 14px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<div id="toast" class="toast"></div>
<div id="confirm-overlay" class="confirm-overlay" style="display:none">
  <div class="confirm-box">
    <div class="confirm-title" id="confirm-title">¿Estás seguro?</div>
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-btns">
      <button class="confirm-btn-cancel" onclick="confirmResolve(false)">Cancelar</button>
      <button class="confirm-btn-ok" onclick="confirmResolve(true)">Eliminar</button>
    </div>
  </div>
</div>
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">⚽ Mundial</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;color:var(--text-muted);margin-bottom:1.5rem;">FAMILIAR · PICOTAS 2026</div>
    <div id="view-login">
      <input class="input" id="l-email" type="email" placeholder="Correo electrónico" />
      <div style="position:relative;">
        <input class="input" id="l-pass" type="password" placeholder="Contraseña" style="padding-right:44px;margin-bottom:10px;" />
        <button type="button" onclick="togglePass('l-pass',this)" style="position:absolute;right:12px;top:10px;background:none;border:none;cursor:pointer;font-size:16px;color:#7a9a7a;padding:0;">👁</button>
      </div>
      <button class="btn-main" id="btn-login" onclick="doLogin()">Entrar</button>
      <button class="btn-sec" onclick="showRegister()">¿No tienes cuenta? Regístrate</button>
      <div class="login-err" id="login-err"></div>
    </div>
    <div id="view-register" style="display:none">
      <input class="input" id="r-name" type="text" placeholder="Tu nombre completo" />
      <input class="input" id="r-nick" type="text" placeholder="Nickname (ej: Tito, Abuela, Papi)" />
      <input class="input" id="r-email" type="email" placeholder="Correo electrónico" />
      <div style="position:relative;">
        <input class="input" id="r-pass" type="password" placeholder="Contraseña (mín. 6 caracteres)" style="padding-right:44px;margin-bottom:10px;" />
        <button type="button" onclick="togglePass('r-pass',this)" style="position:absolute;right:12px;top:10px;background:none;border:none;cursor:pointer;font-size:16px;color:#7a9a7a;padding:0;">👁</button>
      </div>
      <button class="btn-main" id="btn-register" onclick="doRegister()">Crear cuenta</button>
      <button class="btn-sec" onclick="showLogin()">¿Ya tienes cuenta? Inicia sesión</button>
      <div class="login-err" id="register-err"></div>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">⚽ Mundial <span>Familiar · Picotas</span></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <strong id="header-name" style="font-size:14px;"></strong>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
  </header>
  <nav>
    <button class="nav-btn active" onclick="showTab('partidos',this)">Partidos</button>
    <button class="nav-btn" onclick="showTab('tabla',this)">Tabla</button>
    <button class="nav-btn" onclick="showTab('perfil',this)">Mi perfil</button>
    <button class="nav-btn" id="nav-admin" style="display:none" onclick="showTab('admin',this)">Admin</button>
  </nav>
  <main>
    <div id="tab-partidos" class="section active">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;">
        <div class="section-title" style="margin:0">Partidos</div>
        <button onclick="loadMatches()" style="font-size:12px;padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--text-muted);cursor:pointer;">Actualizar</button>
      </div>
      <div class="legend">
        <span class="pts-badge pts-exact">+5 pts</span> Marcador exacto &nbsp;
        <span class="pts-badge pts-outcome">+3 pts</span> Ganador/empate &nbsp;
        <span class="pts-badge pts-wrong">0 pts</span> Fallo
      </div>
      <div id="matches-container"><div class="empty"><span class="spinner"></span> Cargando...</div></div>
    </div>
    <div id="tab-tabla" class="section">
      <div class="section-title">Tabla de posiciones</div>
      <div id="lb-container"><div class="empty"><span class="spinner"></span> Cargando...</div></div>
    </div>
    <div id="tab-perfil" class="section">
      <div class="section-title">Mi perfil</div>
      <div id="profile-container"></div>
    </div>
    <div id="tab-admin" class="section">
      <div class="section-title">Admin</div>
      <div id="admin-container"><div class="empty"><span class="spinner"></span> Cargando...</div></div>
    </div>
  </main>
</div>

<script>
const SUPABASE_URL = 'https://kzomuimnoxtcfjcuqgiu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_4U3skEL7RboqhnEn8wap2w_jT3C1lMP';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const ADMIN_EMAIL = 'abrahampicota@gmail.com';

let currentUser = null, currentProfile = null, allMatches = [], allPredictions = [];

// ── PUNTAJE ───────────────────────────────────────────
// 5 pts = marcador exacto, 3 pts = ganador/empate correcto, 0 = fallo
function calcPts(pred1, pred2, real1, real2) {
  if (real1 === null || real2 === null || pred1 === null || pred2 === null) return null;
  if (pred1 === real1 && pred2 === real2) return 5;
  if (getOutcome(pred1, pred2) === getOutcome(real1, real2)) return 3;
  return 0;
}

function getOutcome(g1, g2) {
  if (g1 === null || g2 === null) return null;
  return g1 > g2 ? 'local' : g2 > g1 ? 'visitante' : 'empate';
}

// ── AUTH ──────────────────────────────────────────────
function showRegister() {
  document.getElementById('view-login').style.display = 'none';
  document.getElementById('view-register').style.display = 'block';
}
function showLogin() {
  document.getElementById('view-register').style.display = 'none';
  document.getElementById('view-login').style.display = 'block';
}
async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass = document.getElementById('l-pass').value;
  const err = document.getElementById('login-err');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Ingresa correo y contraseña'; return; }
  document.getElementById('btn-login').textContent = '...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { err.textContent = 'Correo o contraseña incorrectos'; document.getElementById('btn-login').textContent = 'Entrar'; return; }
  await initApp(data.user);
}
async function doRegister() {
  const name = document.getElementById('r-name').value.trim();
  const nick = document.getElementById('r-nick').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const pass = document.getElementById('r-pass').value;
  const err = document.getElementById('register-err');
  err.textContent = '';
  if (!name) { err.textContent = 'Ingresa tu nombre'; return; }
  if (!nick) { err.textContent = 'Ingresa un nickname'; return; }
  if (!email) { err.textContent = 'Ingresa tu correo'; return; }
  if (pass.length < 6) { err.textContent = 'La contraseña debe tener al menos 6 caracteres'; return; }
  document.getElementById('btn-register').textContent = '...';
  const { data, error } = await sb.auth.signUp({ email, password: pass, options: { data: { name, nickname: nick } } });
  if (error) { err.textContent = error.message; document.getElementById('btn-register').textContent = 'Crear cuenta'; return; }
  if (data.user) { await ensureProfile(data.user, name, nick); await initApp(data.user); }
  else { err.style.color='#68d391'; err.textContent='Revisa tu correo para confirmar.'; document.getElementById('btn-register').textContent='Crear cuenta'; }
}
async function ensureProfile(user, name, nick) {
  const displayName = name || user.user_metadata?.name || user.email.split('@')[0];
  // Check if profile already exists to avoid overwriting nickname
  const { data: existing } = await sb.from('profiles').select('nickname').eq('id', user.id).single();
  const nickname = nick || existing?.nickname || user.user_metadata?.nickname || displayName;
  await sb.from('profiles').upsert({ id: user.id, name: displayName, nickname, email: user.email }, { onConflict: 'id' });
}
async function logout() { await sb.auth.signOut(); location.reload(); }
async function initApp(user) {
  currentUser = user;
  await ensureProfile(user, user.user_metadata?.name);
  const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
  currentProfile = profile;
  document.getElementById('header-name').textContent = profile?.nickname || profile?.name || user.email;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  if (user.email === ADMIN_EMAIL) {
    document.getElementById('nav-admin').style.display = 'block';
  }
  await loadMatches();
}

// ── TABS ──────────────────────────────────────────────
function showTab(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'tabla') loadLeaderboard();
  if (name === 'perfil') renderProfile();
  if (name === 'admin') loadAdmin();
}

// ── MATCHES ───────────────────────────────────────────
async function syncResultsFromAPI() {
  // Only sync AFTER the World Cup first match starts (June 11, 2026 at 18:00 UTC)
  const wcStart = new Date('2026-06-11T18:00:00Z');
  if (new Date() < wcStart) {
    console.log('Mundial not started yet, skipping API sync');
    return;
  }

  try {
    const today = new Date().toISOString().split('T')[0];
    const res = await fetch(
      'https://v3.football.api-sports.io/fixtures?league=1&season=2026&date=' + today,
      { headers: { 'x-apisports-key': 'd24e40ac1dfb8c75b7c6584dfd75d353' } }
    );
    if (!res.ok) return;
    const json = await res.json();
    if (!json.response || !json.response.length) return;

    const liveStatuses = ['FT','AET','PEN','1H','2H','HT','ET','BT','P'];
    const updates = json.response.filter(f => liveStatuses.includes(f.fixture.status.short));
    if (!updates.length) return;

    // Match API results to our matches by team names (not by ID)
    for (const f of updates) {
      const apiTeam1 = f.teams.home.name;
      const apiTeam2 = f.teams.away.name;
      // Find our match by comparing team names loosely
      const local = allMatches.find(m =>
        m.team1.toLowerCase().includes(apiTeam1.toLowerCase().split(' ')[0]) ||
        apiTeam1.toLowerCase().includes(m.team1.toLowerCase().split(' ')[0])
      );
      if (!local) continue;
      // Only update result fields, never overwrite teams or group
      await sb.from('matches').update({
        status: f.fixture.status.short,
        goals1: f.goals.home,
        goals2: f.goals.away
      }).eq('id', local.id);
      local.status = f.fixture.status.short;
      local.goals1 = f.goals.home;
      local.goals2 = f.goals.away;
    }
    console.log('Synced results from API');
  } catch(e) {
    console.warn('API sync failed:', e);
  }
}

async function loadMatches() {
  document.getElementById('matches-container').innerHTML = '<div class="empty"><span class="spinner"></span> Cargando partidos...</div>';
  const { data, error } = await sb.from('matches').select('*').order('date', { ascending: true });
  if (error || !data) { document.getElementById('matches-container').innerHTML = '<div class="empty">Error cargando partidos.</div>'; return; }
  allMatches = data;
  const ids = allMatches.map(m => m.id);
  const { data: preds } = await sb.from('predictions').select('*, profiles(name,nickname)').in('match_id', ids);
  allPredictions = preds || [];
  // Sync results from API in background (won't block rendering)
  syncResultsFromAPI().then(() => renderMatches());
  renderMatches();
}

function getCollapsedState() {
  // First read from DOM (current session)
  const state = {};
  document.querySelectorAll('[id^="day-"]').forEach(el => {
    state[el.id] = el.style.display === 'none';
  });
  return state;
}

function saveCollapsedToStorage(state) {
  try { localStorage.setItem('wc_collapsed', JSON.stringify(state)); } catch(e) {}
}

function loadCollapsedFromStorage() {
  try { return JSON.parse(localStorage.getItem('wc_collapsed') || '{}'); } catch(e) { return {}; }
}

function renderMatches() {
  const container = document.getElementById('matches-container');
  if (!allMatches.length) { container.innerHTML = '<div class="empty">No hay partidos cargados.</div>'; return; }

  // Save current DOM state then merge with localStorage
  const domState = getCollapsedState();
  const storedState = loadCollapsedFromStorage();
  // DOM state takes priority if elements exist, otherwise use stored
  const collapsed = Object.keys(domState).length > 0 ? domState : storedState;

  // Group matches by day (Panama time UTC-5)
  const groups = {};
  allMatches.forEach(m => {
    const d = new Date(m.date);
    // Convert to Panama time (UTC-5)
    const panamaDate = new Date(d.getTime() - 5 * 60 * 60 * 1000);
    const key = panamaDate.toISOString().split('T')[0];
    if (!groups[key]) groups[key] = [];
    groups[key].push(m);
  });

  const today = new Date();
  const todayPanama = new Date(today.getTime() - 5 * 60 * 60 * 1000).toISOString().split('T')[0];

  container.innerHTML = Object.keys(groups).sort().map(day => {
    const matches = groups[day];
    const date = new Date(day + 'T12:00:00');
    const dayStr = date.toLocaleDateString('es', { weekday:'long', day:'numeric', month:'long' });
    const dayStrCap = dayStr.charAt(0).toUpperCase() + dayStr.slice(1);
    const isToday = day === todayPanama;
    const hasLive = matches.some(m => ['1H','2H','HT','ET','BT','P'].includes(m.status));
    const hasDone = matches.every(m => ['FT','AET','PEN'].includes(m.status));
    const myPreds = matches.filter(m => allPredictions.find(p => p.match_id === m.id && p.user_id === currentUser.id)).length;

    // Auto-expand today and days with live matches; collapse past days
    const isPast = day < todayPanama && !hasLive;
    const isOpen = !isPast || isToday || hasLive;

    let badge = '';
    if (hasLive) badge = '<span class="badge badge-live" style="background:#3a0a0a;color:#fc8181;font-size:10px;">⚽ EN VIVO</span>';
    else if (isToday) badge = '<span class="badge badge-soon" style="font-size:10px;">HOY</span>';
    else if (hasDone) badge = '<span class="badge badge-done" style="font-size:10px;">Finalizado</span>';

    const predBadge = myPreds > 0 ? '<span style="font-size:10px;color:#F5C518">'+myPreds+'/'+matches.length+' ✓</span>' : '<span style="font-size:10px;color:#7a9a7a">0/'+matches.length+' pronósticos</span>';

    // Check if user had this day collapsed before
    const wasCollapsed = collapsed['day-'+day];
    const finalOpen = wasCollapsed !== undefined ? !wasCollapsed : isOpen;

    return '<div class="day-group">'
      + '<div class="day-header" data-target="day-'+day+'" onclick="toggleDay(this)">'
        + '<div style="display:flex;align-items:center;gap:8px;">'
          + '<div class="day-title">'+dayStrCap+'</div>'
          + badge
        + '</div>'
        + '<div class="day-meta">'
          + predBadge
          + '<span class="day-arrow '+(finalOpen?'open':'')+'" id="arrow-'+day+'">▼</span>'
        + '</div>'
      + '</div>'
      + '<div id="day-'+day+'" style="display:'+(finalOpen?'block':'none')+';">'
        + matches.map(m => matchCard(m)).join('')
      + '</div>'
    + '</div>';
  }).join('');
}

function togglePass(inputId, btn) {
  const input = document.getElementById(inputId);
  if (!input) return;
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  btn.textContent = isHidden ? '🙈' : '👁';
}

function toggleDay(btn) {
  const id = btn.dataset.target;
  const day = id.replace('day-', '');
  const el = document.getElementById(id);
  const arrow = document.getElementById('arrow-' + day);
  if (!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  if (arrow) arrow.classList.toggle('open', !isOpen);
  // Save state to localStorage
  const state = getCollapsedState();
  saveCollapsedToStorage(state);
}

function matchCard(m) {
  const myPred = allPredictions.find(p => p.match_id === m.id && p.user_id === currentUser.id);
  const done = ['FT','AET','PEN'].includes(m.status);
  const dateStr = m.date ? new Date(m.date).toLocaleString('es', { weekday:'short', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '';
  const live = ['1H','2H','HT','ET','BT','P'].includes(m.status);
  const badgeHtml = done ? '<span class="badge badge-done">Finalizado</span>' 
    : live ? '<span class="badge badge-live" style="background:#3a0a0a;color:#fc8181;animation:pulse 1s infinite;">⚽ EN VIVO</span>'
    : '<span class="badge badge-soon">Próximo</span>';

  const scoreHtml = done
    ? `<div class="score-box"><div class="score">${m.goals1} - ${m.goals2}</div><div style="font-size:10px;color:var(--text-muted)">Final</div></div>`
    : live
    ? `<div class="score-box" style="border-color:#742a2a"><div class="score" style="color:#fc8181">${m.goals1 ?? 0} - ${m.goals2 ?? 0}</div><div style="font-size:10px;color:#fc8181">En juego</div></div>`
    : `<div class="score-box"><div class="score" style="font-size:1rem;color:var(--text-muted)">vs</div></div>`;

  // Prediction input
  let predHtml = '';
  if (myPred) {
    // Already predicted — show result
    const pts = done ? calcPts(myPred.pred_goals1, myPred.pred_goals2, m.goals1, m.goals2) : null;
    let ptsBadge = '';
    if (pts === 5) ptsBadge = '<span class="pts-badge pts-exact">+5 pts ⭐ Exacto!</span>';
    else if (pts === 3) ptsBadge = '<span class="pts-badge pts-outcome">+3 pts ✓ Ganador</span>';
    else if (pts === 0) ptsBadge = '<span class="pts-badge pts-wrong">0 pts ✗</span>';
    else ptsBadge = '<span class="pts-badge pts-pending">Pendiente</span>';
    const deadline = new Date('2026-06-11T05:00:00Z');
    const canEdit = new Date() < deadline && !done;
    const borderColor = pts === 5 ? '#00875A' : pts === 3 ? '#5a5000' : pts === 0 ? '#742a2a' : '#00875A';
    const bgColor = pts === 5 ? '#0d2a1a' : pts === 3 ? '#1a1a05' : pts === 0 ? '#1a0808' : '#0d2a1a';
    predHtml = `
      <div style="background:${bgColor};border:1px solid ${borderColor};border-radius:10px;padding:12px;text-align:center;">
        <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:6px;">
          <span style="font-size:11px;color:#7a9a7a;text-transform:uppercase;letter-spacing:1px;">MI PRONÓSTICO</span>
          <span style="font-size:14px;color:${borderColor};">✓ Guardado</span>
        </div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;color:#F5C518;margin-bottom:6px;">${myPred.pred_goals1} - ${myPred.pred_goals2}</div>
        ${ptsBadge}
        ${canEdit ? `<button onclick="editPred(${m.id})" style="margin-top:10px;padding:5px 16px;border:1px solid #2a382a;border-radius:6px;background:none;color:#7a9a7a;font-size:12px;cursor:pointer;">✏️ Editar</button>` : ''}
      </div>`;
  } else if (!done) {
    // Can edit until June 11 2026 00:00 UTC-5 (Panama)
    const deadline = new Date('2026-06-11T05:00:00Z');
    const canEdit = new Date() < deadline;
    predHtml = `
      <div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;text-align:center;">¿Cuál será el marcador?</div>
        <div style="display:flex;align-items:flex-end;justify-content:center;gap:12px;margin-bottom:10px;">
          <div style="text-align:center;">
            <div class="score-team-label">${m.team1}</div>
            <input class="score-input" id="g1-${m.id}" type="number" min="0" max="20" placeholder="?" ${!canEdit ? 'disabled' : ''} />
          </div>
          <div class="score-sep" style="margin-bottom:8px;">-</div>
          <div style="text-align:center;">
            <div class="score-team-label">${m.team2}</div>
            <input class="score-input" id="g2-${m.id}" type="number" min="0" max="20" placeholder="?" ${!canEdit ? 'disabled' : ''} />
          </div>
        </div>
        ${canEdit
          ? '<button class="btn-save-pred" onclick="savePred(' + m.id + ')">Guardar pronóstico</button>'
          : '<div style="text-align:center;font-size:12px;color:#fc8181;padding:6px 0;">⏰ Plazo vencido — el Mundial ya comenzó</div>'
        }
      </div>`;
  } else {
    predHtml = `<div style="text-align:center;color:var(--text-muted);font-size:13px;padding:8px 0;">No hiciste un pronóstico para este partido</div>`;
  }

  // All predictions sorted by pts — collapsible mini-ranking
  const allMatchPreds = allPredictions.filter(p => p.match_id === m.id);
  const rankedPreds = allMatchPreds.map(p => {
    const pts = done ? calcPts(p.pred_goals1, p.pred_goals2, m.goals1, m.goals2) : null;
    return { ...p, pts };
  }).sort((a, b) => (b.pts ?? -1) - (a.pts ?? -1));

  const rankingRows = rankedPreds.map((p, i) => {
    const isMe = p.user_id === currentUser.id;
    let bg = '#1a221a', border = '#2a382a', ptsTxt = '—', ptsColor = '#7a9a7a';
    if (p.pts === 5)      { bg='#0d2a1a'; border='#00875A'; ptsTxt='+5 ⭐'; ptsColor='#68d391'; }
    else if (p.pts === 3) { bg='#1a1a05'; border='#5a5000'; ptsTxt='+3';    ptsColor='#F5C518'; }
    else if (p.pts === 0) { bg='#1a0808'; border='#742a2a'; ptsTxt='0';     ptsColor='#fc8181'; }
    const predScore = (p.pred_goals1 !== null && p.pred_goals2 !== null) ? p.pred_goals1+' - '+p.pred_goals2 : 'Sin pronóstico';
    const leftBorder = isMe ? 'border-left:3px solid #F5C518;' : '';
    return '<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;margin-bottom:4px;background:'+bg+';border:1px solid '+border+';'+leftBorder+'">'
      +'<div style="font-size:12px;font-weight:700;width:18px;color:#7a9a7a">'+(i+1)+'</div>'
      +'<div style="width:28px;height:28px;border-radius:50%;background:#006644;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#F5C518;flex-shrink:0">'+(p.profiles?.name||'?')[0].toUpperCase()+'</div>'
      +'<div style="flex:1">'
        +'<div style="font-size:13px;font-weight:500;color:#e8f0e8">'+(p.profiles?.name||'?')+(isMe?' <span style="font-size:10px;color:#7a9a7a">(tú)</span>':'')+'</div>'
        +'<div style="font-size:11px;color:#7a9a7a">Pronosticó: '+predScore+'</div>'
      +'</div>'
      +'<div style="font-size:13px;font-weight:700;color:'+ptsColor+'">'+ptsTxt+'</div>'
      +'</div>';
  }).join('');

  const rankingSection = rankedPreds.length > 0 ? (
    '<div style="border-top:1px solid #2a382a;margin-top:12px;padding-top:12px;">'
    +'<button onclick="toggleRanking(\'r-\'+this.dataset.id)" data-id="'+m.id+'" style="width:100%;display:flex;align-items:center;justify-content:space-between;background:none;border:none;cursor:pointer;padding:0;">'
      +'<span style="font-size:11px;color:#7a9a7a;text-transform:uppercase;letter-spacing:1px;">Puntos por partido ('+rankedPreds.length+')</span>'
      +'<span id="r-'+m.id+'-icon" style="font-size:12px;color:#7a9a7a">▼ Ver</span>'
    +'</button>'
    +'<div id="r-'+m.id+'" style="display:none;margin-top:10px;">'+rankingRows+'</div>'
    +'</div>'
  ) : '';

  return '<div class="match-card">'
    +'<div class="match-meta">'
      +'<span class="match-group">'+(m.group_name||'')+'</span>'
      +'<div style="display:flex;gap:8px;align-items:center;">'+badgeHtml+'<span class="match-date">'+dateStr+'</span></div>'
    +'</div>'
    +'<div class="match-teams">'
      +'<div class="team-name team-left">'+m.team1+'</div>'
      +scoreHtml
      +'<div class="team-name">'+m.team2+'</div>'
    +'</div>'
    +'<div class="pred-section">'
      +predHtml
      +rankingSection
    +'</div>'
  +'</div>';
}

async function savePred(matchId) {
  const g1Input = document.getElementById('g1-' + matchId);
  const g2Input = document.getElementById('g2-' + matchId);
  if (!g1Input || !g2Input) return;
  const g1 = g1Input.value === '' ? NaN : parseInt(g1Input.value);
  const g2 = g2Input.value === '' ? NaN : parseInt(g2Input.value);
  if (isNaN(g1) || isNaN(g2) || g1 < 0 || g2 < 0) {
    showToast('Ingresa el marcador para ambos equipos antes de guardar', 'error'); return;
    return;
  }
  if (allPredictions.find(p => p.match_id === matchId && p.user_id === currentUser.id)) return;
  const { error } = await sb.from('predictions').insert({
    match_id: matchId,
    user_id: currentUser.id,
    pred_goals1: g1,
    pred_goals2: g2,
    prediction: getOutcome(g1, g2)
  });
  if (!error) {
    allPredictions.push({ match_id: matchId, user_id: currentUser.id, pred_goals1: g1, pred_goals2: g2, prediction: getOutcome(g1,g2), profiles: { name: currentProfile?.name } });
    renderMatches();
  } else {
    showToast('Error guardando el pronóstico. Intenta de nuevo.', 'error');
    console.error(error);
  }
}

async function loadLeaderboard() {
  document.getElementById('lb-container').innerHTML = '<div class="empty"><span class="spinner"></span> Calculando...</div>';
  const { data: profiles } = await sb.from('profiles').select('*');
  const { data: preds } = await sb.from('predictions').select('*, matches(status,goals1,goals2)');
  if (!profiles) return;
  const scores = profiles.map(p => {
    const myPreds = (preds||[]).filter(x => x.user_id === p.id);
    let pts = 0, exact = 0, outcome = 0, played = 0;
    myPreds.forEach(x => {
      if (!x.matches || !['FT','AET','PEN'].includes(x.matches.status)) return;
      played++;
      const p2 = calcPts(x.pred_goals1, x.pred_goals2, x.matches.goals1, x.matches.goals2);
      pts += p2 || 0;
      if (p2 === 5) exact++;
      else if (p2 === 3) outcome++;
    });
    return { ...p, pts, exact, outcome, played };
  }).sort((a,b) => b.pts - a.pts);
  const medals = ['🥇','🥈','🥉'];
  document.getElementById('lb-container').innerHTML = `
    <div style="display:grid;grid-template-columns:auto auto 1fr auto auto;gap:8px;font-size:11px;color:var(--text-muted);padding:0 14px 8px;">
      <span>#</span><span></span><span>Jugador</span><span style="text-align:center">⭐ Exactos</span><span style="text-align:right">Pts</span>
    </div>
    ` + scores.map((s,i) => `
    <div class="lb-item ${s.id === currentUser.id ? 'me' : ''}">
      <div class="lb-rank">${medals[i]||i+1}</div>
      <div class="lb-avatar">${s.name[0].toUpperCase()}</div>
      <div style="flex:1">
        <div style="font-weight:500">${s.name} ${s.id===currentUser.id?'<span style="font-size:11px;color:var(--text-muted)">(tú)</span>':''}</div>
        <div style="font-size:12px;color:var(--text-muted)">${s.exact} exactos · ${s.outcome} ganador · ${s.played} jugados</div>
      </div>
      <div style="text-align:right"><div class="lb-pts-num">${s.pts}</div><div class="lb-pts-label">pts</div></div>
    </div>`).join('');
}

  let totalPts = 0, exact = 0, outcome = 0, played = 0;
  (preds||[]).forEach(p => {
    if (!p.matches || !['FT','AET','PEN'].includes(p.matches.status)) return;
    played++;
    const pts = calcPts(p.pred_goals1, p.pred_goals2, p.matches.goals1, p.matches.goals2);

    <div class="card" style="text-align:center;border-color:var(--gold);margin-bottom:1rem;">

        <button onclick="saveNickname()" style="padding:6px 12px;background:#F5C518;color:#0a0f0a;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;">Guardar</button>

      <div class="stat-card"><div class="stat-num">${outcome}</div><div class="stat-label">Ganador</div></div>
      <div class="stat-card"><div class="stat-num">${played}</div><div class="stat-label">Jugados</div></div>

    <div style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--text-muted);margin-bottom:10px;">MIS PRONÓSTICOS</div>
    ${!(preds||[]).length ? '<div class="empty">Aún no tienes pronósticos.</div>' :
      (preds||[]).map(p => {
        if (!p.matches) return '';
        const isDone = ['FT','AET','PEN'].includes(p.matches.status);
        const pts = isDone ? calcPts(p.pred_goals1, p.pred_goals2, p.matches.goals1, p.matches.goals2) : null;
        let ptsBadge = '';

        else if (pts===3) ptsBadge='<span class="pts-badge pts-outcome">+3 ✓</span>';
        else if (pts===0) ptsBadge='<span class="pts-badge pts-wrong">0 pts</span>';
        else ptsBadge='<span class="pts-badge pts-pending">Pendiente</span>';

            +'<div style="font-size:12px;color:#7a9a7a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+( p.email||'—')+'</div>'
          +'</div>'
          +'<div style="text-align:right;flex-shrink:0">'
            +'<div style="font-size:13px;color:#F5C518;font-weight:600">'+nPreds+' pronósticos</div>'
            +'<div style="font-size:11px;color:#7a9a7a">Desde '+joinDate+'</div>'
          +'</div>'
        +'</div>'
        +(deleteBtn ? '<div style="margin-top:8px;border-top:1px solid #2a382a;padding-top:8px;">'+deleteBtn+'</div>' : '')
      +'</div>';
    }).join('');
}

async function deleteUser(btn) {
  const userId = btn.dataset.uid;
  const userName = btn.dataset.uname;
  const ok = await confirmDialog('Eliminar a ' + userName, 'Se borrarán también todos sus pronósticos. Esta acción no se puede deshacer.'); if (!ok) return;
  const card = document.getElementById('user-card-' + userId);
  if (card) card.style.opacity = '0.4';
  // Delete predictions first (FK constraint)
  await sb.from('predictions').delete().eq('user_id', userId);
  // Delete profile
  const { error } = await sb.from('profiles').delete().eq('id', userId);
  if (error) {
    showToast('Error eliminando usuario. Bórralo desde Supabase > Authentication > Users.', 'error');
    if (card) card.style.opacity = '1';
    return;
  }
  if (card) card.remove();
  // Update count
  const countEl = document.querySelector('#admin-container [style*="1.8rem"]');
  if (countEl) countEl.textContent = parseInt(countEl.textContent) - 1;
}

async function saveNickname() {
  const nick = document.getElementById('nick-input').value.trim();
  const msg = document.getElementById('nick-msg');
  if (!nick) { msg.style.color='#fc8181'; msg.textContent='Ingresa un nickname'; return; }
  const { error } = await sb.from('profiles').update({ nickname: nick }).eq('id', currentUser.id);
  if (error) { msg.style.color='#fc8181'; msg.textContent='Error guardando'; return; }
  currentProfile.nickname = nick;
  document.getElementById('header-name').textContent = nick;
  msg.style.color='#68d391';
  msg.textContent='Nickname actualizado!';
  setTimeout(() => { msg.textContent=''; }, 3000);
}

let confirmResolve = null;

function showToast(msg, type = 'info') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast toast-' + type + ' show';
  setTimeout(() => { toast.classList.remove('show'); }, 3500);
}

function confirmDialog(title, msg) {
  return new Promise(resolve => {
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-msg').textContent = msg;
    document.getElementById('confirm-overlay').style.display = 'flex';
    confirmResolve = (val) => {
      document.getElementById('confirm-overlay').style.display = 'none';
      resolve(val);
    };
  });
}

function toggleRanking(btn) {
  const id = btn.dataset.id;
  const el = document.getElementById(id);
  const icon = btn.querySelector('span:last-child');
  if (!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  if (icon) icon.textContent = isOpen ? '▼ Ver' : '▲ Ocultar';
}

sb.auth.getSession().then(({ data: { session } }) => {
  if (session?.user) initApp(session.user);
});

// Auto-refresh every 2 minutes if there are live matches
setInterval(async () => {
  if (!currentUser) return;
  const hasLive = allMatches.some(m => ['1H','2H','HT','ET','BT','P'].includes(m.status));
  if (hasLive) {
    await syncResultsFromAPI();
    renderMatches();
  }
}, 2 * 60 * 1000);
</script>
